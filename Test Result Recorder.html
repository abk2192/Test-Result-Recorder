<!DOCTYPE html>
<html lang="en" data-theme="light" data-color="blue">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Test Result Recorder</title>
<style>
  /* ===== Theme Engine (CSS Variables) ===== */
  :root {
    /* Core Dimensions & Shadows */
    --r12: 16px; --r10: 12px; --r8: 10px;
    --shadow: 0 10px 25px rgba(0, 0, 0, .05);
    --shadow-2: 0 6px 16px rgba(0, 0, 0, .08);
  }

  /* Light Mode (Default) */
  :root[data-theme="light"] {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --surface-2: #f2f4f8;
    --text: #0f172a;
    --muted: #475569;
    --outline: #cbd5e1;
    --outline-2: #e5e7eb;
    --danger: #ef4444;
    --danger-hover: #fef2f2;
    --danger-border: #fca5a5;
    --input-bg: #ffffff;
    --evidence-bg: #fbfcff;
  }

  /* Dark Mode */
  :root[data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --text: #f8fafc;
    --muted: #94a3b8;
    --outline: #334155;
    --outline-2: #475569;
    --danger: #f87171;
    --danger-hover: #451a1a;
    --danger-border: #7f1d1d;
    --input-bg: #0f172a;
    --evidence-bg: #0b1120;
    --shadow: 0 10px 25px rgba(0, 0, 0, .3);
    --shadow-2: 0 6px 16px rgba(0, 0, 0, .4);
  }

  /* Color Palettes */
  :root[data-color="blue"] { --primary: #2563eb; --primary-2: #1d4ed8; --primary-light: rgba(37,99,235,.12); --grad-1: #2563eb; --grad-2: #7c3aed; }
  :root[data-color="green"] { --primary: #16a34a; --primary-2: #15803d; --primary-light: rgba(22,163,74,.12); --grad-1: #16a34a; --grad-2: #059669; }
  :root[data-color="purple"] { --primary: #9333ea; --primary-2: #7e22ce; --primary-light: rgba(147,51,234,.12); --grad-1: #9333ea; --grad-2: #c026d3; }
  :root[data-color="rose"] { --primary: #e11d48; --primary-2: #be123c; --primary-light: rgba(225,29,72,.12); --grad-1: #e11d48; --grad-2: #f43f5e; }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* ===== App bar ===== */
  .appbar{
    position: sticky;
    top:0;
    height: 64px;
    z-index: 50;
    background: var(--surface);
    opacity: 0.95;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--outline);
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  .appbar-inner{
    display:flex;
    align-items:center;
    height: 100%;
    gap:12px;
    padding: 0 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .title{
    display:flex; align-items:center; gap:10px;
    font-weight: 750;
    letter-spacing: .2px;
    font-size: 16px;
    flex:1;
    min-width: 180px;
  }
  .title .badge{
    width:34px; height:34px;
    display:grid; place-items:center;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
    color:white;
    box-shadow: var(--shadow-2);
    font-size: 16px;
  }
  .actions{
    display:flex;
    gap:8px;
    flex-wrap: wrap;
    justify-content:flex-end;
  }
  .btn{
    appearance:none;
    border: 1px solid transparent;
    background: var(--primary);
    color:#fff;
    padding: 9px 12px;
    border-radius: 999px;
    cursor:pointer;
    font-weight: 650;
    font-size: 13px;
    box-shadow: 0 4px 10px var(--primary-light);
    transition: transform .08s ease, background .15s ease, box-shadow .15s ease, border-color 0.15s ease, color 0.15s ease;
    user-select:none;
    white-space:nowrap;
  }
  .btn:hover{ background: var(--primary-2); }
  .btn:active{ transform: translateY(1px); box-shadow: none; }
  .btn.secondary{
    background: var(--surface);
    color: var(--text);
    border-color: var(--outline);
    box-shadow:none;
  }
  .btn.secondary:hover{ background: var(--surface-2); }
  .btn.danger{
    background: var(--surface);
    color: var(--danger);
    border-color: var(--outline);
    box-shadow:none;
  }
  .btn.danger:hover { background: var(--danger-hover); border-color: var(--danger-border); }

  /* ===== Tabs ===== */
  .tabsbar{
    max-width: 1200px;
    margin: 10px auto 0;
    padding: 0 16px;
  }
  .tabs{
    display:flex;
    gap: 8px;
    align-items:center;
    overflow:auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
  }
  .tab{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid var(--outline);
    background: var(--surface);
    color: var(--text);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    transition: all .15s ease;
    font-weight: 650;
    font-size: 13px;
  }
  .tab:hover{ background: var(--surface-2); }
  .tab:active{ transform: translateY(1px); }
  .tab.active{
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }
  .tab .x{
    width: 20px; height:20px;
    display:grid; place-items:center;
    border-radius: 999px;
    border: 1px solid transparent;
    color: var(--muted);
    font-weight: 900;
    font-size: 14px;
  }
  .tab .x:hover{
    background: var(--danger-hover);
    color: var(--danger);
  }
  .tab.plus{
    border-style:dashed;
    color: var(--muted);
    background: transparent;
  }

  /* ===== Main layout ===== */
  main{
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 16px 28px;
  }
  .panel-head{
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    gap: 12px;
    margin: 12px 0 10px;
  }
  .panel-meta{
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }
  .tab-panel { display: none; }

  /* ===== Cards / scenarios ===== */
  details.scenario{
    background: var(--surface);
    border: 1px solid var(--outline-2);
    border-radius: var(--r12);
    box-shadow: var(--shadow);
    margin: 12px 0;
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  
  /* STICKY SUMMARY */
  summary{
    list-style:none;
    cursor:pointer;
    padding: 12px 16px;
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    gap: 12px;
    user-select:none;
    position: sticky;
    top: 64px; 
    z-index: 46;
    background: var(--surface);
    border-radius: var(--r12) var(--r12) 0 0;
    transition: background 0.3s ease;
  }
  details[open] > summary {
    border-bottom: 1px solid var(--outline-2);
  }
  summary::-webkit-details-marker{ display:none; }
  
  .summary-content { flex: 1; min-width: 0; }
  .summary-title{ font-weight: 750; font-size: 14px; color: var(--text); margin-top: 4px; }
  .summary-sub{ font-size: 12px; color: var(--muted); margin-top: 4px; }
  
  .summary-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .summary-actions .btn { padding: 6px 10px; font-size: 12px; }
  
  .summary-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    font-size: 11px;
    background: var(--surface-2);
    border: 1px solid var(--outline-2);
    padding: 3px 8px;
    border-radius: 6px;
    color: var(--muted);
    white-space: nowrap;
  }
  .tag b { color: var(--text); font-weight: 700; margin-right: 4px; }

  .chev{
    width: 30px; height:30px;
    display:grid; place-items:center;
    border-radius: 10px;
    border: 1px solid var(--outline-2);
    background: var(--surface);
    color: var(--muted);
    flex: none;
  }
  .chev svg { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  details[open] summary .chev svg { transform: rotate(180deg); }

  .card-body{ padding: 14px 16px 16px; }

  /* Dynamic Fields */
  .field-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
  .field-row { display: flex; gap: 8px; align-items: center; }
  .field-row .input { flex: 1; }
  .field-row .btn.del { padding: 0; width: 38px; height: 38px; font-size: 18px; display: grid; place-items: center; color: var(--danger); }

  .label{ font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  
  .input{
    width: 100%;
    padding: 11px 12px;
    border-radius: 12px;
    border: 1px solid var(--outline);
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: all .15s ease;
    font-size: 13px;
  }
  .input:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-light);
  }

  .evidence-wrap{ margin-top: 16px; }
  .evidence{
    border: 1px dashed var(--outline-2);
    background: var(--evidence-bg);
    color: var(--text);
    border-radius: var(--r12);
    padding: 12px;
    min-height: 130px;
    outline:none;
    line-height: 1.4;
    transition: all 0.3s ease;
  }
  .evidence:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-light);
    background: var(--input-bg);
  }
  .evidence p { margin: 0 0 8px 0; }
  .evidence h3 { margin: 0 0 8px 0; font-size: 15px; color: var(--text); font-weight: 800;}
  .evidence ul { margin: 0 0 8px 0; padding-left: 20px; }
  
  .hint{ font-size: 12px; color: var(--muted); margin-top: 6px; }

  .attachment{
    margin-top: 8px;
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--outline-2);
    background: var(--surface-2);
  }
  .attachment a{ color: var(--primary); text-decoration:none; font-weight: 650; font-size: 13px; word-break: break-all; }
  .attachment a:hover{ text-decoration: underline; }

  .evidence img{
    max-width: 100%; height: auto; cursor: nwse-resize;
    border-radius: 12px; margin-top: 8px;
    box-shadow: var(--shadow-2); transition: width .15s ease;
  }

  @media (max-width: 600px){
    .appbar { height: auto; min-height: 60px; padding: 10px 0;} 
    .appbar-inner{ flex-wrap: wrap; padding: 0 12px; }
    main{ padding: 12px 12px 22px; }
    summary { top: 60px; flex-direction: column; }
    .summary-actions { width: 100%; justify-content: flex-end; }
  }

  /* Dialogs */
  .dlg-backdrop{
    position: fixed; inset:0;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px);
    display:none; align-items:center; justify-content:center;
    padding: 16px; z-index: 100;
  }
  .dlg{
    width: min(520px, 100%);
    background: var(--surface);
    border-radius: 18px;
    border: 1px solid var(--outline-2);
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .dlg-head{ padding: 14px 16px; border-bottom: 1px solid var(--outline-2); font-weight: 800; font-size: 16px; color: var(--text);}
  .dlg-body{ padding: 14px 16px; color: var(--text);}
  .dlg-actions{ padding: 12px 16px; border-top: 1px solid var(--outline-2); display:flex; justify-content:flex-end; gap: 8px; }

  /* Theme Chooser Specifics */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;}
  .theme-card {
    border: 2px solid var(--outline-2); border-radius: 12px; padding: 12px;
    text-align: center; cursor: pointer; font-weight: 700; color: var(--text);
    transition: all 0.2s ease;
  }
  .theme-card:hover { border-color: var(--muted); }
  .theme-card.active { border-color: var(--primary); background: var(--primary-light); }
  
  .color-grid { display: flex; gap: 12px; justify-content: center; }
  .color-swatch {
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform 0.2s ease;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--text); }
  
  /* Export-only Readonly Styles */
  .readonly summary{ cursor: pointer !important; }
  .readonly [contenteditable]{ outline:none !important; }
</style>
</head>

<body>
  <header class="appbar">
    <div class="appbar-inner">
      <div class="title">
        <div class="badge">✅</div>
        Test Result Recorder
      </div>
      <div class="actions">
        <button class="btn secondary" id="themeBtn">🎨 Theme</button>
        <button class="btn secondary" id="helpBtn" style="display:none;">❓ Help</button> <!-- Hidden but kept for shortcuts -->
        <button class="btn secondary" id="renameTabBtn">✏️ Rename Tab</button>
        <button class="btn" id="addScenarioBtn">➕ Add Scenario</button>
        <button class="btn secondary" id="importBtn">⬆️ Import</button>
        <input type="file" id="importInput" accept=".html" hidden />
        <button class="btn secondary" id="exportHtmlBtn" style="border-color: var(--primary); color: var(--primary);">⬇ Export Report</button>
      </div>
    </div>
  </header>

  <div class="tabsbar">
    <div class="tabs" id="tabs"></div>
  </div>

  <main>
    <div class="panel-head">
      <div>
        <div class="panel-meta" id="panelMeta">Tip: Paste screenshots directly into Evidence (Ctrl+V). Click images to resize.</div>
      </div>
    </div>
    <div id="panel"></div>
  </main>

  <!-- Rename Dialog -->
  <div class="dlg-backdrop" id="dlgBackdrop" role="dialog" aria-modal="true">
    <div class="dlg">
      <div class="dlg-head" id="dlgTitle">Dialog</div>
      <div class="dlg-body">
        <div class="label" style="margin-bottom:6px;">Name</div>
        <input class="input" id="dlgInput" placeholder="Enter name..." />
        <div class="hint" id="dlgHint" style="margin-top:8px;"></div>
      </div>
      <div class="dlg-actions">
        <button class="btn secondary" id="dlgCancel">Cancel</button>
        <button class="btn" id="dlgOk">OK</button>
      </div>
    </div>
  </div>

  <!-- Theme Dialog -->
  <div class="dlg-backdrop" id="themeBackdrop" role="dialog" aria-modal="true">
    <div class="dlg" style="max-width: 400px;">
      <div class="dlg-head">🎨 Appearance Settings</div>
      <div class="dlg-body">
        <div class="label" style="margin-bottom: 10px;">Mode</div>
        <div class="theme-grid">
          <div class="theme-card" data-set-theme="light">☀️ Light</div>
          <div class="theme-card" data-set-theme="dark">🌙 Dark</div>
        </div>
        
        <div class="label" style="margin-bottom: 10px;">Accent Color</div>
        <div class="color-grid">
          <div class="color-swatch" data-set-color="blue" style="background: #2563eb;"></div>
          <div class="color-swatch" data-set-color="green" style="background: #16a34a;"></div>
          <div class="color-swatch" data-set-color="purple" style="background: #9333ea;"></div>
          <div class="color-swatch" data-set-color="rose" style="background: #e11d48;"></div>
        </div>
      </div>
      <div class="dlg-actions">
        <button class="btn" id="themeClose">Done</button>
      </div>
    </div>
  </div>

<script>
/* ========= Theme Engine ========= */
const rootParams = document.documentElement;
let currentTheme = localStorage.getItem('test_recorder_theme') || 'light';
let currentColor = localStorage.getItem('test_recorder_color') || 'blue';

function applyTheme() {
  rootParams.setAttribute('data-theme', currentTheme);
  rootParams.setAttribute('data-color', currentColor);
  localStorage.setItem('test_recorder_theme', currentTheme);
  localStorage.setItem('test_recorder_color', currentColor);
  
  // Update Theme Dialog UI
  document.querySelectorAll('[data-set-theme]').forEach(el => {
    el.classList.toggle('active', el.dataset.setTheme === currentTheme);
  });
  document.querySelectorAll('[data-set-color]').forEach(el => {
    el.classList.toggle('active', el.dataset.setColor === currentColor);
  });
}
applyTheme(); // Apply immediately on load

// Theme Dialog Logic
const themeBtn = document.getElementById("themeBtn");
const themeBackdrop = document.getElementById("themeBackdrop");
const themeClose = document.getElementById("themeClose");

themeBtn.addEventListener("click", () => { themeBackdrop.style.display = "flex"; });
themeClose.addEventListener("click", () => { themeBackdrop.style.display = "none"; });
themeBackdrop.addEventListener("click", (e) => { if(e.target === themeBackdrop) themeBackdrop.style.display = "none"; });

document.querySelectorAll('[data-set-theme]').forEach(el => {
  el.addEventListener('click', (e) => {
    currentTheme = e.target.dataset.setTheme;
    applyTheme();
  });
});

document.querySelectorAll('[data-set-color]').forEach(el => {
  el.addEventListener('click', (e) => {
    currentColor = e.target.dataset.setColor;
    applyTheme();
  });
});


/* ========= State & Storage ========= */
const STORAGE_KEY = "test_recorder_tabs_v6";
let lastFocusedScenarioId = null; 

let state = loadState() || {
  activeTabId: null,
  tabs: [
    { id: uid(), name: "Tab 1", scenarios: [{ id: uid(), name:"", fields: [], evidenceHtml:"", isOpen: true }] }
  ]
};
if (!state.activeTabId) state.activeTabId = state.tabs[0].id;

function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }

/* ========= Rendering ========= */
const tabsEl = document.getElementById("tabs");
const panelEl = document.getElementById("panel");

function activeTab(){ return state.tabs.find(t => t.id === state.activeTabId); }

function render(){
  renderTabs();
  renderPanel();
  saveState();
}

function renderTabs(){
  tabsEl.innerHTML = "";
  state.tabs.forEach(tab => {
    const btn = document.createElement("button");
    btn.className = "tab" + (tab.id === state.activeTabId ? " active" : "");
    btn.type = "button";
    btn.innerHTML = `
      <span>${escapeHtml(tab.name)}</span>
      ${state.tabs.length > 1 ? `<span class="x" title="Close tab" data-close-tab="${tab.id}">×</span>` : ``}
    `;
    btn.addEventListener("click", (e) => {
      const close = e.target.closest("[data-close-tab]");
      if (close){ e.stopPropagation(); closeTab(close.getAttribute("data-close-tab")); return; }
      state.activeTabId = tab.id;
      render();
    });
    tabsEl.appendChild(btn);
  });

  const plus = document.createElement("button");
  plus.className = "tab plus";
  plus.type = "button";
  plus.textContent = "＋ New tab";
  plus.addEventListener("click", () => promptNewTab());
  tabsEl.appendChild(plus);
}

function renderPanel(){
  panelEl.innerHTML = "";
  state.tabs.forEach(tab => {
    const wrap = document.createElement("div");
    wrap.className = "tab-panel";
    if (tab.id === state.activeTabId) wrap.style.display = "block";

    tab.scenarios.forEach((sc, idx) => {
      wrap.appendChild(renderScenarioCard(sc, idx));
    });
    panelEl.appendChild(wrap);
  });

  const active = activeTab();
  if (active) {
    document.getElementById("panelMeta").textContent =
      `Active: ${active.name} • Scenarios: ${active.scenarios.length} • Paste screenshots in Evidence and click images to resize.`;
  }
}

function renderScenarioCard(sc, idx){
  const d = document.createElement("details");
  d.className = "scenario";
  d.dataset.sid = sc.id; 
  d.open = sc.isOpen !== false; 

  const title = (sc.name || "").trim();
  const summaryTitle = title ? `Scenario ${idx+1} — ${title}` : `Scenario ${idx+1}`;

  const validFields = (sc.fields || []).filter(f => f.key.trim() || f.val.trim());
  const tagsHtml = validFields.map(f => 
    `<span class="tag"><b>${escapeHtml(f.key || "Field")}:</b> ${escapeHtml(f.val || "-")}</span>`
  ).join("");

  const fieldsHtml = (sc.fields || []).map(f => `
    <div class="field-row">
      <input class="input" data-fkey="${f.id}" data-sid="${sc.id}" value="${escapeAttr(f.key)}" placeholder="Field Name (e.g., Env, Policy)" />
      <input class="input" data-fval="${f.id}" data-sid="${sc.id}" value="${escapeAttr(f.val)}" placeholder="Value" />
      <button class="btn secondary del action-btn" type="button" data-delfield="${f.id}" data-sid="${sc.id}">×</button>
    </div>
  `).join("");

  d.innerHTML = `
    <summary>
      <div class="summary-content">
        <div class="summary-title">${escapeHtml(summaryTitle)}</div>
        ${tagsHtml ? `<div class="summary-tags">${tagsHtml}</div>` : `<div class="summary-sub">Click to expand/collapse</div>`}
      </div>
      <div class="summary-actions">
        <button class="btn secondary action-btn" type="button" data-attach="${sc.id}">📎 Attach</button>
        <button class="btn danger action-btn" type="button" title="Delete Scenario" data-delete="${sc.id}">🗑</button>
        <div class="chev">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </summary>

    <div class="card-body">
      <div class="label">Test Case Name</div>
      <input class="input" style="margin-bottom: 12px;" data-field="name" data-sid="${sc.id}" value="${escapeAttr(sc.name||"")}" placeholder="e.g., Login with valid user" />
      
      <div class="label">Scenario Details</div>
      <div class="field-list">
        ${fieldsHtml}
        <div><button class="btn secondary action-btn" type="button" data-addfield="${sc.id}" style="font-size: 12px; padding: 6px 12px;">+ Add Field</button></div>
      </div>

      <div class="evidence-wrap">
        <div class="label" style="margin-bottom: 6px;">Evidence</div>
        <div class="evidence" contenteditable="true" data-evidence="${sc.id}" spellcheck="false"></div>
        <div class="hint">Paste screenshots (Ctrl+V) here. Click images to resize.</div>
        <input type="file" hidden data-file="${sc.id}" />
      </div>
    </div>
  `;

  const evidence = d.querySelector(`[data-evidence="${sc.id}"]`);
  evidence.innerHTML = sc.evidenceHtml || "";
  return d;
}

/* ========= Interactions ========= */

// Track Focus for Global Shortcuts
document.addEventListener("focusin", (e) => {
  const scWrapper = e.target.closest(".scenario");
  if (scWrapper) lastFocusedScenarioId = scWrapper.dataset.sid;
});

// Import File
const importBtn = document.getElementById("importBtn");
const importInput = document.getElementById("importInput");
importBtn.addEventListener("click", () => { importInput.click(); });
importInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(event.target.result, "text/html");
      const payloadEl = doc.getElementById('data-payload');
      if (payloadEl) {
        const importedState = JSON.parse(payloadEl.textContent);
        if (importedState && importedState.tabs) {
          state = importedState;
          render();
          
          // Optionally import the theme that the file was exported with
          const htmlTag = doc.querySelector('html');
          if(htmlTag && htmlTag.dataset.theme) {
            currentTheme = htmlTag.dataset.theme;
            currentColor = htmlTag.dataset.color || 'blue';
            applyTheme();
          }

          alert("Test Report imported successfully!");
        } else { alert("Invalid test report format."); }
      } else { alert("No test data found in this HTML file."); }
    } catch (err) { alert("Error reading file."); }
    e.target.value = ""; 
  };
  reader.readAsText(file);
});

document.getElementById("addScenarioBtn").addEventListener("click", () => {
  const tab = activeTab();
  const newId = uid();
  tab.scenarios.push({ id: newId, name:"", fields: [], evidenceHtml:"", isOpen: true });
  render();
  setTimeout(() => {
    const inp = document.querySelector(`input[data-sid="${newId}"][data-field="name"]`);
    if (inp) inp.focus();
  }, 50);
});

document.getElementById("renameTabBtn").addEventListener("click", () => {
  const tab = activeTab();
  promptDialog("Rename tab", tab.name, "Give this tab a short name.", (val) => {
    tab.name = (val || "Untitled").trim();
    render();
  });
});

document.getElementById("exportHtmlBtn").addEventListener("click", exportHTML);

document.addEventListener("toggle", (e) => {
  if (e.target.matches("details.scenario")) {
    const sc = findScenario(e.target.dataset.sid);
    if (sc) { sc.isOpen = e.target.open; saveState(); }
  }
}, true);

document.addEventListener("input", (e) => {
  const nameInp = e.target.closest("input[data-field='name']");
  if (nameInp) {
    const sc = findScenario(nameInp.dataset.sid);
    if (sc) { sc.name = nameInp.value; saveState(); renderPanelOnly(); }
    return;
  }
  const keyInp = e.target.closest("input[data-fkey]");
  if (keyInp) {
    const sc = findScenario(keyInp.dataset.sid);
    const field = sc.fields.find(f => f.id === keyInp.dataset.fkey);
    if (field) { field.key = keyInp.value; saveState(); renderPanelOnly(); }
    return;
  }
  const valInp = e.target.closest("input[data-fval]");
  if (valInp) {
    const sc = findScenario(valInp.dataset.sid);
    const field = sc.fields.find(f => f.id === valInp.dataset.fval);
    if (field) { field.val = valInp.value; saveState(); renderPanelOnly(); }
    return;
  }
});

document.addEventListener("input", (e) => {
  const ev = e.target.closest(".evidence[data-evidence]");
  if (!ev) return;
  const sc = findScenario(ev.getAttribute("data-evidence"));
  if (!sc) return;
  sc.evidenceHtml = ev.innerHTML;
  saveState();
});

document.addEventListener("click", (e) => {
  const actionBtn = e.target.closest('.action-btn');
  if(actionBtn && e.target.closest('summary')) { e.preventDefault(); }

  const del = e.target.closest("[data-delete]");
  if (del){ deleteScenario(del.dataset.delete); return; }

  const att = e.target.closest("[data-attach]");
  if (att){ openFilePicker(att.dataset.attach); return; }

  const addF = e.target.closest("[data-addfield]");
  if (addF){
    const sc = findScenario(addF.dataset.addfield);
    if(sc) { 
      sc.fields.push({ id: uid(), key:"", val:"" }); 
      render(); 
      setTimeout(() => {
        const inputs = document.querySelectorAll(`input[data-sid="${sc.id}"][data-fkey]`);
        if(inputs.length > 0) inputs[inputs.length - 1].focus();
      }, 50);
    }
    return;
  }

  const delF = e.target.closest("[data-delfield]");
  if (delF){
    const sc = findScenario(delF.dataset.sid);
    if(sc) { sc.fields = sc.fields.filter(f => f.id !== delF.dataset.delfield); render(); }
    return;
  }
});

document.addEventListener("paste", (e) => {
  const ev = e.target.closest(".evidence[data-evidence]");
  if (!ev) return;
  const dt = e.clipboardData;
  if (!dt) return;

  const files = [...dt.files || []];
  const imgFile = files.find(f => f.type && f.type.startsWith("image/"));
  if (imgFile){
    e.preventDefault(); 
    insertImageFileIntoEvidence(imgFile, ev);
    return;
  }
});

document.addEventListener("click", (e) => {
  const img = e.target.closest(".evidence img");
  if (!img) return;
  let w = Number(img.dataset.w || 100);
  w = (w <= 40) ? 100 : (w - 20);
  img.dataset.w = String(w);
  img.style.width = w + "%";
});

document.addEventListener("click", (e) => {
  const a = e.target.closest("a[data-dataurl]");
  if (!a) return;
  if (!a.getAttribute("href")){
    const du = a.dataset.dataurl;
    if (du) a.href = du;
  }
});

/* ========= Global Keyboard Shortcuts ========= */
document.addEventListener("keydown", (e) => {
  if (document.getElementById("dlgBackdrop").style.display === "flex" || 
      document.getElementById("themeBackdrop").style.display === "flex") {
      if (e.key === "Escape") {
         document.getElementById("dlgCancel").click();
         document.getElementById("themeClose").click();
      }
      return; 
  }

  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const cmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;

  if (cmdOrCtrl && e.key.toLowerCase() === 's') {
    e.preventDefault();
    document.getElementById("exportHtmlBtn").click();
  }
  else if (cmdOrCtrl && e.key.toLowerCase() === 'o') {
    e.preventDefault();
    document.getElementById("importBtn").click();
  }
  else if (e.altKey) {
    const key = e.key.toLowerCase();
    
    if (key === 'n') { e.preventDefault(); document.getElementById("addScenarioBtn").click(); }
    if (key === 'r') { e.preventDefault(); document.getElementById("renameTabBtn").click(); }
    if (key === 't') { e.preventDefault(); promptNewTab(); }
    if (key === 'c') { e.preventDefault(); document.getElementById("themeBtn").click(); } // Changed shortcut to match Theme
    
    if (key === 'f') { 
      e.preventDefault(); 
      let sc = null;
      if (lastFocusedScenarioId) sc = findScenario(lastFocusedScenarioId);
      if (!sc) {
        const tab = activeTab();
        if(tab && tab.scenarios.length > 0) sc = tab.scenarios[tab.scenarios.length - 1];
      }
      if (sc) {
         sc.fields.push({ id: uid(), key:"", val:"" });
         render();
         setTimeout(() => {
           const inputs = document.querySelectorAll(`input[data-sid="${sc.id}"][data-fkey]`);
           if(inputs.length > 0) inputs[inputs.length - 1].focus();
         }, 50);
      }
    }
  }
});

/* ========= Helpers ========= */
function renderPanelOnly(){
  const tab = activeTab();
  if (!tab) return;
  
  const panels = [...document.querySelectorAll(".tab-panel")];
  panels.forEach(panel => {
    const cards = [...panel.querySelectorAll("details.scenario")];
    cards.forEach((card, idx) => {
      const sid = card.dataset.sid;
      const sc = findScenario(sid);
      if(!sc) return;

      const title = sc.name.trim() ? `Scenario ${idx+1} — ${sc.name}` : `Scenario ${idx+1}`;
      const titleEl = card.querySelector(".summary-title");
      if (titleEl) titleEl.textContent = title;

      const tagsContainer = card.querySelector(".summary-tags") || card.querySelector(".summary-sub");
      const validFields = sc.fields.filter(f => f.key.trim() || f.val.trim());
      
      if(validFields.length > 0) {
        const tagsHtml = validFields.map(f => `<span class="tag"><b>${escapeHtml(f.key || "Field")}:</b> ${escapeHtml(f.val || "-")}</span>`).join("");
        if(tagsContainer.className === "summary-sub") {
          tagsContainer.outerHTML = `<div class="summary-tags">${tagsHtml}</div>`;
        } else {
          tagsContainer.innerHTML = tagsHtml;
        }
      } else {
        if(tagsContainer.className === "summary-tags") {
          tagsContainer.outerHTML = `<div class="summary-sub">Click to expand/collapse</div>`;
        }
      }
    });
  });
}

function findScenario(sid){
  for (const t of state.tabs){
    const sc = t.scenarios.find(s => s.id === sid);
    if (sc) return sc;
  }
  return null;
}
function deleteScenario(sid){
  const tab = activeTab();
  if(confirm("Are you sure you want to delete this scenario?")) {
    tab.scenarios = tab.scenarios.filter(s => s.id !== sid);
    render();
  }
}

function moveCursorToEnd(el) {
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function openFilePicker(sid){
  const input = document.querySelector(`input[type="file"][data-file="${sid}"]`);
  const ev = document.querySelector(`.evidence[data-evidence="${sid}"]`);
  if (!input || !ev) return;

  input.onchange = () => {
    const f = input.files && input.files[0];
    if (!f) return;
    if (f.type && f.type.startsWith("image/")){ insertImageFileIntoEvidence(f, ev, f.name); input.value = ""; return; }

    const r = new FileReader();
    r.onload = () => {
      const dataUrl = r.result;
      const wrap = document.createElement("div");
      wrap.className = "attachment";
      wrap.contentEditable = "false";
      
      const link = document.createElement("a");
      link.textContent = "📎 " + f.name;
      link.download = f.name;
      link.dataset.name = f.name;
      link.dataset.dataurl = dataUrl;
      link.href = dataUrl;

      wrap.appendChild(link);
      ev.appendChild(wrap);
      ev.appendChild(document.createTextNode('\u00A0'));
      persistEvidence(ev);
      input.value = "";
      moveCursorToEnd(ev);
    };
    r.readAsDataURL(f);
  };
  input.click();
}

function insertImageFileIntoEvidence(file, ev, altText){
  const r = new FileReader();
  r.onload = () => {
    const img = document.createElement("img");
    img.src = r.result; 
    img.alt = altText || "evidence image";
    img.style.width = "100%";
    img.dataset.w = "100";
    img.contentEditable = "false";
    ev.appendChild(img);
    ev.appendChild(document.createTextNode('\u00A0'));
    persistEvidence(ev);
    moveCursorToEnd(ev);
  };
  r.readAsDataURL(file);
}

function persistEvidence(ev){
  const sid = ev.getAttribute("data-evidence");
  const sc = findScenario(sid);
  if (!sc) return;
  sc.evidenceHtml = ev.innerHTML;
  saveState();
}

/* ========= Tabs CRUD ========= */
function promptNewTab(){
  promptDialog("New tab", `Tab ${state.tabs.length+1}`, "Enter a name for the new tab.", (val) => {
    const name = (val || "Untitled").trim();
    const id = uid();
    const newScenId = uid();
    state.tabs.push({ id, name, scenarios: [{ id: newScenId, name:"", fields: [], evidenceHtml:"", isOpen: true }] });
    state.activeTabId = id;
    render();
    setTimeout(() => {
      const inp = document.querySelector(`input[data-sid="${newScenId}"][data-field="name"]`);
      if (inp) inp.focus();
    }, 50);
  });
}

function closeTab(id){
  const idx = state.tabs.findIndex(t => t.id === id);
  if (idx < 0) return;
  if(confirm("Are you sure you want to delete this tab and all its scenarios?")) {
    state.tabs.splice(idx, 1);
    if (state.activeTabId === id){
      state.activeTabId = state.tabs[Math.max(0, idx-1)]?.id || null;
      if (!state.activeTabId) {
        state.tabs.push({ id: uid(), name: "Tab 1", scenarios: [] });
        state.activeTabId = state.tabs[0].id;
      }
    }
    render();
  }
}

/* ========= Export HTML (Self-Extracting JSON Payload Engine) ========= */
function exportHTML(){
  const styles = document.querySelector('style').innerHTML;
  const payloadStr = JSON.stringify(state).replace(/</g, '\\u003c');

  const exportTemplate = `<!DOCTYPE html>
<html lang="en" data-theme="${currentTheme}" data-color="${currentColor}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Test Result Report</title>
<style>${styles}</style>
</head>
<body class="readonly">
  <header class="appbar">
    <div class="appbar-inner">
      <div class="title"><div class="badge">✅</div> Test Result Report</div>
    </div>
  </header>
  <div class="tabsbar"><div class="tabs" id="tabs"></div></div>
  <main><div id="panel"></div></main>

  <script id="data-payload" type="application/json">${payloadStr}<\/script>
  <script>
    const state = JSON.parse(document.getElementById('data-payload').textContent);
    let activeTabId = state.activeTabId;

    function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s])); }

    function renderView() {
      const tabsEl = document.getElementById("tabs");
      tabsEl.innerHTML = state.tabs.map(tab => 
        \`<button class="tab \${tab.id === activeTabId ? 'active' : ''}" data-tab="\${tab.id}">\${escapeHtml(tab.name)}</button>\`
      ).join("");

      const panelEl = document.getElementById("panel");
      const activeTab = state.tabs.find(t => t.id === activeTabId);
      
      if(!activeTab) return;

      const scenariosHtml = activeTab.scenarios.map((sc, idx) => {
        const title = sc.name.trim() ? \`Scenario \${idx+1} — \${sc.name}\` : \`Scenario \${idx+1}\`;
        const validFields = (sc.fields || []).filter(f => f.key.trim() || f.val.trim());
        const tagsHtml = validFields.map(f => \`<span class="tag"><b>\${escapeHtml(f.key || "Field")}:</b> \${escapeHtml(f.val || "-")}</span>\`).join("");

        return \`
          <details class="scenario" \${sc.isOpen !== false ? 'open' : ''}>
            <summary>
              <div class="summary-content">
                <div class="summary-title">\${escapeHtml(title)}</div>
                \${tagsHtml ? \`<div class="summary-tags">\${tagsHtml}</div>\` : ''}
              </div>
              <div class="summary-actions">
                <div class="chev">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
              </div>
            </summary>
            <div class="card-body">
              <div class="evidence-wrap" style="margin-top: 0;">
                <div class="label" style="margin-bottom: 6px;">Evidence</div>
                <div class="evidence">\${sc.evidenceHtml}</div>
              </div>
            </div>
          </details>
        \`;
      }).join("");

      panelEl.innerHTML = scenariosHtml;
    }

    document.addEventListener("click", (e) => {
      const tabBtn = e.target.closest(".tab");
      if(tabBtn) { activeTabId = tabBtn.dataset.tab; renderView(); return; }

      const img = e.target.closest(".evidence img");
      if (img){
        let w = Number(img.dataset.w || 100); w = (w <= 40) ? 100 : (w - 20);
        img.dataset.w = String(w); img.style.width = w + "%"; return;
      }

      const a = e.target.closest("a[data-dataurl]");
      if (!a) return;
      e.preventDefault();
      const dataurl = a.dataset.dataurl;
      if (!dataurl) return;
      const name = a.dataset.name || a.getAttribute("download") || "attachment";
      
      const parts = dataurl.split(",");
      const meta = parts[0] || ""; const b64 = parts[1] || "";
      const m = /data:(.*?);base64/.exec(meta);
      const mime = (m && m[1]) ? m[1] : "application/octet-stream";
      
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for (let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
      
      const blob = new Blob([arr], {type:mime});
      const url = URL.createObjectURL(blob);
      const tmp = document.createElement("a");
      tmp.href = url; tmp.download = name;
      document.body.appendChild(tmp); tmp.click();
      setTimeout(() => { tmp.remove(); URL.revokeObjectURL(url); }, 500);
    });

    renderView(); 
  <\/script>
</body>
</html>`;

  const blob = new Blob([exportTemplate], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10);
  a.download = `Test_Report_${dateStr}.html`;
  
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

/* ========= Dialog utility ========= */
const dlgBackdrop = document.getElementById("dlgBackdrop");
const dlgTitle = document.getElementById("dlgTitle");
const dlgInput = document.getElementById("dlgInput");
const dlgHint = document.getElementById("dlgHint");
const dlgCancel = document.getElementById("dlgCancel");
const dlgOk = document.getElementById("dlgOk");
let dlgCallback = null;

function promptDialog(title, initial, hint, onOk){
  dlgTitle.textContent = title;
  dlgHint.textContent = hint || "";
  dlgInput.value = initial || "";
  dlgCallback = onOk;
  dlgBackdrop.style.display = "flex";
  setTimeout(() => dlgInput.focus(), 0);
}

dlgInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && dlgBackdrop.style.display === "flex") {
    e.preventDefault();
    dlgOk.click();
  }
});

dlgCancel.addEventListener("click", () => { dlgBackdrop.style.display = "none"; dlgCallback = null; });
dlgOk.addEventListener("click", () => {
  const val = dlgInput.value;
  dlgBackdrop.style.display = "none";
  const cb = dlgCallback;
  dlgCallback = null;
  if (cb) cb(val);
});
dlgBackdrop.addEventListener("click", (e) => { if (e.target === dlgBackdrop) dlgCancel.click(); });

/* ========= Utils ========= */
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s])); }
function escapeAttr(str){ return escapeHtml(str).replace(/"/g, "&quot;"); }

/* Initial render */
render();
</script>
